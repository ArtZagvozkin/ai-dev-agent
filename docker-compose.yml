services:
  ai-dev-agent:
    image: artzagvozkin/ai-dev-agent:0.1.0
    container_name: ai-dev-agent
    restart: unless-stopped
    ports:
      - "18010:18010"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18010/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
